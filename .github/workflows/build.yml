name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-arm64:
    name: build (arm64, on ubuntu-24.04-arm)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo chmod o+x /home/runner
          sudo ./install_deps.sh

      - name: test harness
        run: |
          stat -c '%a %n' "$HOME"
          ./test/run-all.sh

      - name: build
        run: |
          ./rpi-image-gen build -c ./config/trixie-minbase.yaml
          ./rpi-image-gen build -c ./config/trixie-minbase-ab.yaml
          SOURCE_DATE_EPOCH=$(date -d 'today 00:00:00' +%s) \
            ./rpi-image-gen build -c ./config/ci/arm64-rpi-trixie-slim.yaml

      - name: examples
        run: |
          ./rpi-image-gen build -S ./examples/slim/ -c pi5-slim.yaml
          ./rpi-image-gen build -S ./examples/webkiosk/ -c kiosk.yaml
          ./rpi-image-gen build -S ./examples/ota/ -c ota.yaml

  build-arm64-qemu:
    name: build (arm64, qemu on ubuntu-24.04)
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: enable qemu-user-static
        run: |
          sudo apt-get update
          sudo chmod o+x /home/runner
          sudo apt-get install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-aarch64

      - name: install dependencies
        run: sudo ./install_deps.sh

      - name: test harness
        run: |
          stat -c '%a %n' "$HOME"
          ./test/run-all.sh

      - name: build
        run: ./rpi-image-gen build -c ./config/trixie-minbase.yaml -f

      - name: examples
        run: |
          ./rpi-image-gen build -c ./examples/custom_kernel/config/kbuild.yaml
