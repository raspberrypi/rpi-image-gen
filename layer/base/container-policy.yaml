# METABEGIN
# X-Env-Layer-Name: container-policy
# X-Env-Layer-Category: ci
# X-Env-Layer-Desc: APT and dpkg policy for container images.
#  Intended for use with a container base layer.
#  Derived from https://github.com/debuerreotype/debuerreotype
# X-Env-Layer-Version: 1.0.0
# METAEND
---
mmdebstrap:
  aptopts:
    - APT::Install-Suggests "false"
    - APT::Install-Recommends "false"
    - APT::AutoRemove::SuggestsImportant "false"
    - Acquire::GzipIndexes "true"
    - Acquire::Languages "none"
    - Dir::Cache::pkgcache ""
    - Dir::Cache::srcpkgcache ""
  dpkgopts:
    - force-unsafe-io
    - path-exclude=/usr/share/doc/*
    - path-exclude=/usr/share/info/*
    - path-exclude=/usr/share/man/*
    - path-exclude=/usr/share/lintian/*
    - path-exclude=/usr/share/locale/*
    - path-include=/usr/share/doc/*/copyright
    - path-include=/usr/share/locale/locale.alias
  customize-hooks:
    - |-
      cat > $1/etc/apt/apt.conf.d/99-container-clean <<'EOF'
      DPkg::Post-Invoke { "rm -f /var/cache/apt/archives/*.deb /var/cache/apt/archives/partial/*.deb /var/cache/apt/*.bin || true"; }
      APT::Update::Post-Invoke { "rm -f /var/cache/apt/archives/*.deb /var/cache/apt/archives/partial/*.deb /var/cache/apt/*.bin || true"; }
      EOF
    - |-
      cat > $1/usr/sbin/policy-rc.d <<- 'EOF'
      #!/bin/sh
      exit 101
      EOF
      chmod 0755 $1/usr/sbin/policy-rc.d
