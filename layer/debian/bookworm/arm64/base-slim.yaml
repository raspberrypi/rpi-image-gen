# METABEGIN
# X-Env-Layer-Name: debian-bookworm-arm64-slim
# X-Env-Layer-Category: distribution
# X-Env-Layer-Desc: Debian Bookworm custom layer for arm64 providing
#  a usable and practical base.
# X-Env-Layer-Version: 3.0.0
# X-Env-Layer-Requires: locale-base
# X-Env-Layer-Provides: debian-base
# METAEND
---
mmdebstrap:
  architectures:
    - arm64
  mode: auto
  variant: custom
  suite: bookworm
  mirrors:
    - ${IGTOP}/templates/debian/apt/bookworm.sources
  packages:
    - perl
    - findutils
    - dpkg
    - libc-bin
    - base-files
    - base-passwd
    - debianutils
    - bash
    - diffutils
    - util-linux
    - sed
    - grep
    - gzip
    - udev
    - e2fsprogs
    - debian-archive-keyring
  setup-hooks:
    - mkdir -p $1/bin
    - ln -s bash $1/bin/sh
  aptopts:
    - APT::Install-Suggests "false"
    - APT::Install-Recommends "false"
  dpkgopts:
    - path-exclude=/usr/share/man/*
    - path-include=/usr/share/man/man[1-9]/*
    - path-exclude=/usr/share/locale/*
    - path-include=/usr/share/locale/locale.alias
    - path-exclude=/usr/share/doc/*
    - path-include=/usr/share/doc/*/copyright
    - path-include=/usr/share/doc/*/changelog.Debian.*
    - path-exclude=/usr/share/{doc,info,man,omf,help,gnome/help}/*
    - path-exclude=/usr/share/lintian/*
